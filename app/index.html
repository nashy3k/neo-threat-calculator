<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO Threat Board | Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --panel-bg: rgba(15, 20, 30, 0.8);
            --border-color: #1a2a40;
            --accent-glow: #00f2ff;
            --text-color: #e0e6ed;
            --log-color: #00ff9d;
            --danger: #ff3e3e;
            --warning: #ffb800;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Neural Grid Background */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            grid-template-rows: 80px minmax(0, 1fr);
            height: 100vh;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden; /* Prevent the dashboard itself from scrolling */
        }

        /* Header */
        header {
            grid-column: 1 / span 3;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(90deg, #fff, var(--accent-glow));
            -webkit-background-clip: text;
            background-clip: text; /* Added for lint fix */
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--log-color);
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--log-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); }
            70% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 10px rgba(0, 255, 157, 0); }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
        }

        /* Left Panel - Control */
        .control-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            overflow-y: auto;
        }

        .input-group label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        input, button {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(45deg, #005f6b, #00b8cc);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Center Panel - Main Viewports */
        /* Center Panel - Main Viewports */
        .main-viewport {
            display: grid;
            grid-template-rows: minmax(0, 1fr) 100px;
            gap: 15px;
            min-height: 0;
            min-width: 0;
        }

        .threat-board {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .threat-board table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .threat-board th {
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .threat-board td {
            padding: 12px;
            border-bottom: 1px solid rgba(26, 42, 64, 0.3);
        }

        /* Right Panel - LOGS (The Hero) */
        .log-panel {
            background: #0a0e14;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            min-height: 0; /* CRITICAL: Allows child to scroll within flex parent */
        }

        .log-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .log-stream {
            flex-grow: 1;
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            padding: 15px;
            border-radius: 4px;
            overflow-y: auto;
            color: var(--log-color);
            font-size: 0.85rem;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        .log-entry { margin-bottom: 10px; opacity: 0; animation: fadeIn 0.5s forwards; }
        .log-entry.thought { color: #8892b0; border-left: 2px solid #334155; padding-left: 10px; }
        .log-entry.action { color: var(--accent-glow); }
        .log-entry.observation { color: var(--warning); padding: 5px; background: rgba(255, 184, 0, 0.05); }
        .log-entry.final { color: #fff; font-size: 1rem; border: 1px dashed var(--log-color); padding: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-glow); }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="dashboard">
        <header>
            <h1>NEO Threat Commander</h1>
            <div class="status-badge">
                <div class="pulse"></div>
                <span id="system-status">SYSTEM: ONLINE</span> | LOOPS: <span id="cpu-usage">0</span>
            </div>
        </header>

        <aside class="control-panel">
            <div class="input-group">
                <label>ASSESSMENT TARGET</label>
                <input type="text" id="query-input" value="Find high risk asteroids in the next 7 days">
            </div>
            <button id="launch-btn" onclick="startAssessment()">INITIALIZE SEQUENCE</button>
            <div style="margin-top: auto; font-size: 0.65rem; opacity: 0.5;">
                PROJECT: ADK-BETA-1<br>
                MODEL: GEMINI-2.5-FLASH<br>
                AUTH: ADC VERIFIED
            </div>
        </aside>

        <main class="main-viewport">
            <div class="threat-board" id="threat-board">
                <div style="text-align:center; padding-top: 50px; opacity: 0.5;">
                    AWAITING TELEMETRY DATA...
                </div>
            </div>
            <div class="chat-console" style="background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="Enter tactical order (e.g. 'Zoom in on object 2023 JD2')..." style="flex-grow: 1;">
                <button id="chat-btn" onclick="sendTacticalOrder()" style="width: 100px; margin: 0;">SEND</button>
            </div>
        </main>

        <section class="log-panel">
            <div class="log-header">
                🚀 REASONING ENGINE LOGS
            </div>
            <div class="log-stream" id="log-stream">
                [SYSTEM READY]
            </div>
        </section>
    </div>

    <script>
        const logStream = document.getElementById('log-stream');
        const threatBoard = document.getElementById('threat-board');
        const statusBadge = document.querySelector('.status-badge');
        const statusText = document.getElementById('system-status');
        const cpuText = document.getElementById('cpu-usage');
        
        let loopCount = 0;
        let currentSessionId = 'session-' + Math.random().toString(36).substring(2, 15);

        function setSystemStatus(status) {
            if (status === 'thinking') {
                statusBadge.querySelector('.pulse').style.background = 'var(--warning)';
                statusBadge.style.color = 'var(--warning)';
                statusText.innerHTML = 'ENGINE: ANALYZING';
            } else {
                statusBadge.querySelector('.pulse').style.background = 'var(--log-color)';
                statusBadge.style.color = 'var(--log-color)';
                statusText.innerHTML = 'SYSTEM: IDLE';
            }
        }

        function appendLog(text, type = 'log') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = `> [${new Date().toLocaleTimeString()}] ${text}`;
            logStream.appendChild(div);
            
            // Robust auto-scroll
            setTimeout(() => {
                logStream.scrollTo({
                    top: logStream.scrollHeight,
                    behavior: 'smooth'
                });
            }, 10);
        }

        function renderTelemetry(data) {
            console.log("Rendering telemetry:", data);
            
            // Compatibility: Sometimes ADK sends JSON strings inside logs
            let neoData = data;
            if (typeof data === 'string') {
                try { neoData = JSON.parse(data); } catch(e) { return; }
            }

            if (!neoData || !neoData.near_earth_objects) return;
            
            const objects = [];
            Object.values(neoData.near_earth_objects).forEach(dateGroup => {
                objects.push(...dateGroup);
            });

            if (objects.length === 0) return;

            threatBoard.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="padding: 10px; border-bottom: 1px solid var(--border-color); text-align: left;">DESIGNATION</th>
                            <th style="padding: 10px; border-bottom: 1px solid var(--border-color); text-align: left;">Ø (KM)</th>
                            <th style="padding: 10px; border-bottom: 1px solid var(--border-color); text-align: left;">VELOCITY</th>
                            <th style="padding: 10px; border-bottom: 1px solid var(--border-color); text-align: left;">HAZARD</th>
                        </tr>
                    </thead>
                    <tbody id="threat-rows"></tbody>
                </table>
            `;

            const tbody = document.getElementById('threat-rows');
            objects.sort((a,b) => b.is_potentially_hazardous_asteroid - a.is_potentially_hazardous_asteroid);

            objects.forEach(obj => {
                const tr = document.createElement('tr');
                const isHazard = obj.is_potentially_hazardous_asteroid;
                const diameter = obj.estimated_diameter.kilometers.estimated_diameter_max.toFixed(2);
                const velocity = parseFloat(obj.close_approach_data[0].relative_velocity.kilometers_per_hour).toLocaleString(undefined, {maximumFractionDigits: 0});

                tr.innerHTML = `
                    <td style="padding: 10px; color: var(--accent-glow)">${obj.name}</td>
                    <td style="padding: 10px;">${diameter}</td>
                    <td style="padding: 10px;">${velocity} KM/H</td>
                    <td style="padding: 10px; color: ${isHazard ? 'var(--danger)' : 'var(--log-color)'}">${isHazard ? 'CRITICAL' : 'SAFE'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function startAssessment() {
            // Generate a fresh session ID on initialization to act as a "hard reset" for the agent's memory
            currentSessionId = 'session-' + Math.random().toString(36).substring(2, 15);
            loopCount = 0;
            cpuText.textContent = loopCount;

            const query = document.getElementById('query-input').value;
            logStream.innerHTML = '';
            setSystemStatus('thinking');
            threatBoard.innerHTML = '<div style="text-align:center; padding-top: 50px; opacity: 0.5;">REQUESTING NASA TELEMETRY...</div>';
            appendLog(`Initializing Agentic Loop for: "${query}"`, 'action');
            
            const eventSource = new EventSource(`/stream-assessment?user_query=${encodeURIComponent(query)}&session_id=${currentSessionId}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'telemetry') {
                    renderTelemetry(data.content);
                } else if (data.type === 'log') {
                    loopCount++;
                    cpuText.textContent = loopCount;
                    
                    if (data.content.includes("MISSION COMPLETE") || data.content.includes("ORDER EXECUTED")) {
                        appendLog(data.content, "final");
                        setSystemStatus('idle');
                        eventSource.close();
                    } else if (data.content.startsWith("🚀") || data.content.startsWith("📡")) {
                        appendLog(data.content, "action");
                    } else {
                        appendLog(data.content, "thought");
                    }
                }
            };

            eventSource.onerror = () => {
                appendLog("Stream terminated or complete.", "final");
                setSystemStatus('idle');
                eventSource.close();
            };
        }

        async function sendTacticalOrder() {
            const input = document.getElementById('chat-input');
            const message = input.value;
            if (!message) return;
            
            input.value = '';
            setSystemStatus('thinking');
            appendLog(`Issuing Order: "${message}"`, 'action');
            
            const eventSource = new EventSource(`/stream-assessment?user_query=${encodeURIComponent(message)}&session_id=${currentSessionId}`);
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'telemetry') {
                    renderTelemetry(data.content);
                } else if (data.type === 'log') {
                    loopCount++;
                    cpuText.textContent = loopCount;
                    if (data.content.includes("MISSION COMPLETE") || data.content.includes("ORDER EXECUTED")) {
                        appendLog(data.content, "final");
                        setSystemStatus('idle');
                        eventSource.close();
                    } else {
                        appendLog(data.content, "thought");
                    }
                }
            };
            eventSource.onerror = () => {
                setSystemStatus('idle');
                eventSource.close();
            };
        }
    </script>
</body>
</html>
